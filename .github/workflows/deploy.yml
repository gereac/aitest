name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Deploy on every commit to main
  workflow_dispatch: # Manual trigger if you want it

permissions:
  contents: read
  pages: write # Required for GitHub Pages
  id-token: write # Required for OIDC

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: dist # CHANGE this to your build output folder

  #Set path: to your output folder
  #Plain HTML repo → .
  #Vite → dist/
  #React CRA → build/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
